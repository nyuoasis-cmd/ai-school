<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ai-school — 한결 v1 랜딩 목업</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.min.css">
<style>
  :root {
    --color-text-primary: #1c1917;
    --color-text-body: #57534e;
    --color-text-muted: #78716c;
    --color-text-quaternary: #a8a29e;
    --color-border: #e7e5e4;
    --color-border-hover: #d6d3d1;
    --color-surface: #ffffff;
    --color-surface-hover: #f5f5f4;
    --color-btn-primary: #1c1917;
    --color-btn-primary-hover: #292524;

    --font-body: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
    --font-heading: var(--font-body);

    --radius-btn-landing: 9999px;
    --type-hero-size: clamp(48px, 7vw, 88px);
    --type-hero-tracking: -0.025em;
    --type-body-landing-size: 18px;
    --type-body-landing-leading: 1.55;
    --type-label-en-size: 13px;
    --type-label-en-weight: 700;
    --type-label-en-tracking: 0.08em;

    --ease-smooth: cubic-bezier(.2, .8, .2, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font-body); }
  body {
    background: var(--color-surface);
    color: var(--color-text-primary);
    letter-spacing: -0.005em;
    line-height: 1.7;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }
  @media (min-width: 1024px) { body { font-weight: 300; } }

  .hero-page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 64px 32px;
    text-align: center;
    background: var(--color-surface);
  }
  .hero-inner {
    width: 100%;
    max-width: 880px;
    display: flex; flex-direction: column; align-items: center;
  }

  .hero-label {
    font-size: var(--type-label-en-size);
    font-weight: var(--type-label-en-weight);
    letter-spacing: var(--type-label-en-tracking);
    text-transform: uppercase;
    color: var(--color-text-muted);
    margin-bottom: 24px;
  }
  .hero-title {
    font-family: var(--font-heading);
    font-size: var(--type-hero-size);
    font-weight: 600;
    letter-spacing: var(--type-hero-tracking);
    line-height: 1.05;
    color: var(--color-text-primary);
    word-break: keep-all;
    margin-bottom: 28px;
  }
  .hero-caption {
    font-size: var(--type-body-landing-size);
    font-weight: 400;
    line-height: var(--type-body-landing-leading);
    color: var(--color-text-body);
    max-width: 640px;
    word-break: keep-all;
    margin-bottom: 56px;
  }

  .hero-cta-cluster {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .cta {
    height: 56px;
    padding: 0 32px;
    border-radius: var(--radius-btn-landing);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    transition: all 200ms var(--ease-smooth);
    display: inline-flex; align-items: center; justify-content: center;
    border: none;
    text-decoration: none;
    word-break: keep-all;
  }
  .cta-primary {
    background: var(--color-btn-primary);
    color: var(--color-surface);
  }
  .cta-primary:hover { background: var(--color-btn-primary-hover); }
  .cta-secondary {
    background: var(--color-surface);
    color: var(--color-text-body);
    border: 1px solid var(--color-border);
  }
  .cta-secondary:hover {
    background: var(--color-surface-hover);
    border-color: var(--color-border-hover);
  }


    <h1 class="hero-title">
      선생님의 수업이<br>
      학생의 진짜 경험이 됩니다.
    </h1>

    <p class="hero-caption">
      티처메이트가 만들어 운영하는 AI 교육 쇼케이스. 학과별 11개 사례를 직접 보고 체험해요.
    </p>

    <div class="hero-cta-cluster" role="group" aria-label="수업 시작">
      <a href="#" class="cta cta-secondary" data-cta="secondary">
        사례 체험
      </a>
      <a href="#" class="cta cta-primary" data-cta="primary">
        강의 문의
      </a>
    </div>


  </div>
</main>

</body>
</html>
